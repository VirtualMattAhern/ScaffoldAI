# Deploy frontend to Azure Static Web Apps
# When you create a Static Web App in Azure and connect GitHub, Azure adds its own workflow.
# This file is a reference. If Azure creates a different workflow, add:
#   - VITE_API_URL to the build step env (or as repo secret)
#   - app_location: src/web, output_location: dist, skip_app_build: true

name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && cd src/web && npm ci

      - name: Build web app
        run: cd src/web && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'src/web'
          output_location: 'dist'
          skip_app_build: true
